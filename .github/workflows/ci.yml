name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, types, unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      # Also builds dist/ via the `prepare` script.
      - run: pnpm install --frozen-lockfile
      - name: Lint & format (Biome)
        run: pnpm run check
      - name: Package correctness (publint + attw)
        run: pnpm run test:build
      - name: Unit + build tests (Vitest)
        run: pnpm run test

  e2e:
    name: E2E (service worker, Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Playwright e2e
        run: pnpm run test:e2e
